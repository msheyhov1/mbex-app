<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 80" width="310" height="80">
<defs>
  <!-- X shape scaled from uploaded SVG (256x277 → fits ~74x80) -->
  <!-- Original center of crossing: 127,137 → scaled: maps to center of X group -->
</defs>
<style>
/* 
  Timeline 6s:
  0-20%    MBEX full logo visible
  20-32%   M,B,E all slide inward toward X and shrink/fade INTO X
  32-34%   X alone, slides to center of viewBox (155,40)
  34-62%   X PROPELLER SPIN — 3600deg (10 turns) in 1.7s, LINEAR = max speed
  62-64%   X slides back to its position
  64-80%   M,B,E slide back out from X, grow/appear
  80-100%  Full MBEX, pause
*/

.pm{animation:am 7s ease-in-out infinite}
.pb{animation:ab 7s ease-in-out infinite}
.pe{animation:ae 7s ease-in-out infinite}
.px{animation:ax 7s linear infinite}

/* M slides right to X center (x=266) */
@keyframes am{
  0%,20%{opacity:1;transform:translate(0,0) scale(1)}
  32%{opacity:0;transform:translate(220px,0) scale(0)}
  34%,64%{opacity:0;transform:translate(220px,0) scale(0)}
  80%,100%{opacity:1;transform:translate(0,0) scale(1)}
}

/* B slides right to X center */
@keyframes ab{
  0%,20%{opacity:1;transform:translate(0,0) scale(1)}
  32%{opacity:0;transform:translate(130px,0) scale(0)}
  34%,64%{opacity:0;transform:translate(130px,0) scale(0)}
  80%,100%{opacity:1;transform:translate(0,0) scale(1)}
}

/* E slides right to X center */
@keyframes ae{
  0%,20%{opacity:1;transform:translate(0,0) scale(1)}
  32%{opacity:0;transform:translate(50px,0) scale(0)}
  34%,64%{opacity:0;transform:translate(50px,0) scale(0)}
  80%,100%{opacity:1;transform:translate(0,0) scale(1)}
}

/* X: move to center, PROPELLER at max RPM, move back */
@keyframes ax{
  0%,20%{transform:translate(0,0) rotate(0deg)}
  32%{transform:translate(0,0) rotate(0deg)}
  34%{transform:translate(-111px,0) rotate(0deg)}
  62%{transform:translate(-111px,0) rotate(3600deg)}
  64%{transform:translate(0,0) rotate(3600deg)}
  80%,100%{transform:translate(0,0) rotate(3600deg)}
}
</style>

<!-- ═══ M (shared right edge with B) ═══ -->
<g class="pm" style="transform-origin:50px 40px">
  <rect x="0" y="0" width="16" height="80" fill="#fff"/>
  <polygon points="0,0 16,0 54,36 46,36" fill="#fff"/>
  <polygon points="84,0 100,0 54,36 46,36" fill="#fff"/>
  <rect x="84" y="0" width="16" height="80" fill="#fff"/>
</g>

<!-- ═══ B ═══ -->
<g class="pb" style="transform-origin:140px 40px">
  <rect x="100" y="0" width="16" height="80" fill="#fff"/>
  <rect x="100" y="0" width="56" height="13" fill="#fff"/>
  <rect x="100" y="34" width="52" height="12" fill="#fff"/>
  <rect x="100" y="67" width="56" height="13" fill="#fff"/>
  <path d="M156,0 C174,0 174,34 156,34 L156,0Z" fill="#fff"/>
  <path d="M156,46 C178,46 178,80 156,80 L156,46Z" fill="#fff"/>
</g>

<!-- ═══ E (middle bar arrow into X) ═══ -->
<g class="pe" style="transform-origin:220px 40px">
  <rect x="190" y="0" width="16" height="80" fill="#fff"/>
  <rect x="190" y="0" width="52" height="13" fill="#fff"/>
  <rect x="190" y="34" width="56" height="12" fill="#fff"/>
  <rect x="190" y="67" width="52" height="13" fill="#fff"/>
</g>

<!-- ═══ X — exact shape from uploaded SVG, scaled to fit ═══ -->
<!-- Original 256x277, scaled to ~74x80, positioned at right side -->
<!-- Center of X crossing = 127/256 * 74 + 232 = ~269, 137/277 * 80 = ~39.5 -->
<g class="px" style="transform-origin:269px 39.5px">
  <g transform="translate(232,0) scale(0.289)">
    <path d="M254.432 276.502H184.432L127.602 190.002L70.9315 276.502H0.931534L93.1103 137.502L3.43153 1.00192L73.4315 0.501923L127.432 83.0019L180.932 1.00192H251.432L162.932 137.502L254.432 276.502Z" fill="#fff"/>
  </g>
</g>
</svg>
